<!DOCTYPE html>
<html>
  <head>
    <script>
      (function () {
        var segmentCount = 1;
        var location = window.location;
        var basePath = location.pathname.split('/').slice(0, 1 + segmentCount).join('/');
        var routePath = location.pathname.slice(1).split('/').slice(segmentCount).join('/');
        var query = location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '';
        var redirectUrl =
          location.protocol +
          '//' +
          location.hostname +
          (location.port ? ':' + location.port : '') +
          basePath +
          '/?/' +
          routePath +
          query +
          location.hash;

        location.replace(redirectUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
